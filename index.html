<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pigmenta Rack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #6C3FE8; font-size: 28px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 32px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #6C3FE8; color: white; }
    .btn-secondary { background: #f0f0f0; color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <img src="assets/splash.png" width="80" height="80" style="border-radius:16px;margin-bottom:16px">
    <h1>Pigmenta Rack</h1>
    <p>Gestión de inventario y equivalencias para pintores de miniaturas</p>
    <a href="https://play.google.com/store/apps/details?id=com.tudominio.pigmenta_rack" class="btn btn-primary">
      Descargar en Google Play
    </a>
    <a href="#" class="btn btn-secondary">Más información</a>
  </div>
</body>
</html>
